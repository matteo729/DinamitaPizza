<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pizzería Dinamita | La mejor pizza artesanal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
</head>
<body>
    <!-- LOADING SCREEN PROFESIONAL -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-logo">
                🍕 Pizzería <span>Dinamita</span>
            </div>
            <div class="loading-spinner"></div>
            <div class="loading-text">Cargando experiencia gastronómica</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgress"></div>
            </div>
        </div>
    </div>

    <header id="mainHeader">
        <nav>
            <div class="logo">
                🍕 Pizzería <span>Dinamita</span>
            </div>
            <div class="nav-links">
                <a href="#pizzas">Nuestras Pizzas</a>
                <a href="admin.html">Admin</a>
                <div class="cart-icon" id="cartToggle">
                    🛒
                    <span class="cart-count" id="cartCount">0</span>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <!-- CARRUSEL MEJORADO -->
        <div class="carousel-wrapper">
            <div class="carousel-container" id="carouselContainer">
                <div class="carousel-slides" id="carouselSlides">
                    <!-- Las imágenes se cargarán dinámicamente -->
                </div>
                <div class="carousel-dots" id="carouselDots"></div>
            </div>
        </div>

        <!-- SECCIÓN DE PIZZAS -->
        <div class="container">
            <div class="section-header" id="pizzas">
                <h2>🔥 Nuestras Especialidades</h2>
                <p>Ingredientes frescos, masa artesanal y el sabor que te hará explotar de felicidad</p>
            </div>
            
            <div id="pizzasContainer" class="pizzas-grid">
                <!-- Las pizzas se cargarán dinámicamente -->
            </div>
        </div>
    </main>

    <!-- CARRITO SIDEBAR -->
    <div id="cartOverlay" class="cart-overlay"></div>
    <div id="cartSidebar" class="cart-sidebar">
        <div class="cart-header">
            <h3>🛒 Tu Pedido</h3>
            <button class="close-cart" id="closeCart">✕</button>
        </div>
        <div id="cartItems" class="cart-items">
            <!-- Items del carrito -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total</span>
                <span>$<span id="cartTotal">0</span></span>
            </div>
            <button id="orderBtn" class="btn-whatsapp">
                📱 Ordenar por WhatsApp
            </button>
        </div>
    </div>

    <script src="client.js"></script>
</body>
</html>
